<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="112" fill="#111115"/>
  
  <!-- グラデーション定義 -->
  <defs>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6ef5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5b8df8;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6ef5;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1a6ef5;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- 音符（四分音符） -->
  <!-- 符頭 -->
  <ellipse cx="200" cy="320" rx="46" ry="36" transform="rotate(-20 200 320)" fill="url(#noteGrad)"/>
  <!-- 縦線 -->
  <rect x="240" y="160" width="18" height="164" rx="9" fill="url(#noteGrad)"/>
  <!-- 符尾（旗） -->
  <path d="M258 160 C310 180 330 220 300 270" stroke="url(#noteGrad)" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- 波形バー（右下に小さく） -->
  <rect x="310" y="295" width="18" height="60" rx="9" fill="url(#waveGrad)"/>
  <rect x="338" y="270" width="18" height="85" rx="9" fill="url(#waveGrad)"/>
  <rect x="366" y="285" width="18" height="70" rx="9" fill="url(#waveGrad)"/>
</svg>
