<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
</head>
<body>
    <header class="app-header">
        <div class="logo">Web Music Player</div>
        <div class="auth-area">
            <button id="btn-login" class="primary-btn">Googleでログイン</button>
            <div id="user-info" style="display: none; align-items: center; gap: 15px;">
                <span id="sync-status" style="font-size: 12px; color: var(--text-secondary, #888);"></span>
                <span id="user-name" style="font-weight: bold;"></span>
                <button id="btn-logout" class="secondary-btn">ログアウト</button>
            </div>
        </div>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <nav class="nav-menu">
                <button class="nav-btn active" data-target="main"><span class="material-symbols-outlined">home</span> ホーム</button>
                <button class="nav-btn" data-target="edit"><span class="material-symbols-outlined">edit_note</span> ライブラリ管理</button>
            </nav>
            <div class="sidebar-section">
                <h3>ライブラリ</h3>
                <ul id="my-library-list" class="sidebar-list"></ul>
            </div>
            <div class="sidebar-section">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>プレイリスト</h3>
                    <button id="create-playlist-btn" class="icon-btn" title="新規作成"><span class="material-symbols-outlined">add</span></button>
                </div>
                <ul id="playlists-container" class="sidebar-list"></ul>
            </div>
        </aside>

        <main class="main-content">
            <section id="main" class="page-section active">
                <div class="page-header">
                    <h2 id="current-playlist-name">マイライブラリ (すべて)</h2>
                    <div class="controls-bar">
                        <button id="btn-play-all" class="secondary-btn"><span class="material-symbols-outlined">play_arrow</span> すべて再生</button>
                        <button id="btn-shuffle-all" class="secondary-btn"><span class="material-symbols-outlined">shuffle</span> シャッフル</button>
                        <select id="main-sort-select" class="sort-select">
                            <option value="manual">手動並び替え</option>
                            <option value="date_desc">追加日 (新しい順)</option>
                            <option value="date_asc">追加日 (古い順)</option>
                            <option value="name_asc">タイトル (A-Z)</option>
                            <option value="name_desc">タイトル (Z-A)</option>
                            <option value="artist_asc">アーティスト (A-Z)</option>
                            <option value="random">ランダム</option>
                        </select>
                        <input type="text" id="main-search-input" class="search-input" placeholder="曲を検索...">
                    </div>
                </div>

                <div id="drop-zone" class="drop-zone">
                    <span class="material-symbols-outlined" style="font-size: 32px;">upload_file</span>
                    <p>ここに音楽ファイルをドロップするか、クリックして追加</p>
                    <input type="file" id="file-upload" multiple accept="audio/*" style="display: none;">
                </div>

                <div id="bulk-actions-bar" class="bulk-actions-bar">
                    <span id="bulk-count">0曲を選択中</span>
                    <div class="bulk-buttons">
                        <button id="bulk-add-playlist-btn" class="secondary-btn">プレイリストへ</button>
                        <button id="bulk-edit-btn" class="secondary-btn">編集</button>
                        <button id="bulk-remove-playlist-btn" class="secondary-btn" style="display: none;">リストから外す</button>
                        <button id="bulk-delete-btn" class="danger-btn">完全削除</button>
                    </div>
                </div>

                <div class="track-list-header">
                    <input type="checkbox" id="main-select-all" class="custom-checkbox" title="すべて選択">
                    <span>曲名 / アーティスト</span>
                </div>
                <ul id="current-playlist-items" class="track-list"></ul>
            </section>

            <section id="edit" class="page-section">
                <div class="edit-container">
                    <div class="edit-list-area">
                        <div class="page-header">
                            <h2>曲情報の編集</h2>
                            <input type="text" id="edit-search-input" class="search-input" placeholder="曲を検索...">
                        </div>
                        <div id="edit-selected-count" style="margin-bottom: 10px; font-size: 14px; font-weight: bold;">曲を選択して編集</div>
                        <ul id="edit-library-list" class="edit-list"></ul>
                    </div>
                    
                    <div id="edit-form-area" class="edit-form-area" style="display: none;">
                        <div id="edit-thumbnail-preview" class="thumbnail-preview"></div>
                        <div class="form-group">
                            <label>タイトル</label>
                            <input type="text" id="edit-title">
                        </div>
                        <div class="form-group">
                            <label>アーティスト</label>
                            <input type="text" id="edit-artist">
                        </div>
                        <div class="form-group">
                            <label>リリース日/年</label>
                            <input type="text" id="edit-date">
                        </div>
                        <div class="form-group">
                            <label>タグ追加 (Enterで確定)</label>
                            <input type="text" id="edit-tags-input" list="existing-tags-list" autocomplete="off">
                            <div id="edit-tags-list" class="tags-container"></div>
                        </div>
                        <button id="save-metadata-btn" class="primary-btn" style="margin-top: 20px; width: 100%;">保存して同期</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer class="player-bar">
        <div class="player-info">
            <div id="player-thumbnail" class="player-thumbnail"></div>
            <div>
                <div id="player-title" class="player-title">未選択</div>
                <div id="player-artist" class="player-artist">-</div>
            </div>
        </div>
        <div class="player-controls">
            <div class="control-buttons">
                <button id="ctrl-prev" class="icon-btn"><span class="material-symbols-outlined">skip_previous</span></button>
                <button id="ctrl-play" class="icon-btn play-btn"><span class="material-symbols-outlined">play_arrow</span></button>
                <button id="ctrl-next" class="icon-btn"><span class="material-symbols-outlined">skip_next</span></button>
            </div>
            <div class="progress-container">
                <span id="time-current">0:00</span>
                <input type="range" id="seek-bar" value="0" min="0" max="100">
                <span id="time-total">0:00</span>
            </div>
        </div>
        <div class="player-volume">
            <span class="material-symbols-outlined">volume_up</span>
            <input type="range" id="volume-bar" value="100" min="0" max="100">
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
