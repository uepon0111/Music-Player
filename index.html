<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Music Player & Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-music"></i> AudioApp
        </div>
        <ul class="nav-links">
            <li><a href="#" data-target="player-view" class="active"><i class="fa-solid fa-play"></i> Player</a></li>
            <li><a href="#" data-target="edit-view"><i class="fa-solid fa-sliders"></i> Edit</a></li>
            <li><a href="#" data-target="logs-view"><i class="fa-solid fa-chart-line"></i> Logs</a></li>
        </ul>
        <div class="auth-section">
            <button id="auth-btn" class="btn"><i class="fa-brands fa-google"></i> Login to Drive</button>
            <div id="user-info" class="hidden">
                <span id="user-name"></span>
                <button id="logout-btn" class="btn-icon"><i class="fa-solid fa-sign-out-alt"></i></button>
            </div>
        </div>
    </nav>

    <main class="content">
        <section id="player-view" class="view active">
            <header>
                <h2><i class="fa-solid fa-play"></i> Player</h2>
            </header>
            
            <div class="player-container">
                <div class="now-playing">
                    <div class="thumbnail">
                        <i class="fa-solid fa-compact-disc fa-4x"></i>
                    </div>
                    <h3 id="current-title">No Track Selected</h3>
                    <p id="current-artist">Unknown Artist</p>
                    <audio id="main-audio" controls></audio>
                </div>

                <div class="playlist-section">
                    <div class="playlist-controls">
                        <select id="sort-select">
                            <option value="name-asc">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                            <option value="date-asc">Added (Oldest)</option>
                            <option value="date-desc">Added (Newest)</option>
                            <option value="length-asc">Length (Shortest)</option>
                            <option value="length-desc">Length (Longest)</option>
                        </select>
                        <button class="btn-icon" id="shuffle-btn"><i class="fa-solid fa-shuffle"></i></button>
                    </div>
                    
                    <div id="drop-zone" class="drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up fa-2x"></i>
                        <p>Drag & Drop Audio Files Here<br>or Click to Browse</p>
                        <input type="file" id="file-input" multiple accept="audio/*" class="hidden">
                    </div>

                    <ul id="playlist" class="playlist">
                        </ul>
                </div>
            </div>
        </section>

        <section id="edit-view" class="view hidden">
            <header>
                <h2><i class="fa-solid fa-sliders"></i> Edit Audio Info</h2>
            </header>
            <div class="edit-container">
                <p>Select a track from the player to edit its metadata, or drop a file here.</p>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="edit-title">
                </div>
                <div class="form-group">
                    <label>Artist</label>
                    <input type="text" id="edit-artist">
                </div>
                <div class="form-group">
                    <label>Tags (Comma separated)</label>
                    <input type="text" id="edit-tags">
                </div>
                <div class="form-group">
                    <label>Release Year</label>
                    <input type="number" id="edit-year">
                </div>
                
                <div class="advanced-edit">
                    <h3>Advanced Options (Mockup)</h3>
                    <div class="form-group">
                        <label>Convert Format</label>
                        <select id="format-select">
                            <option value="mp3">MP3</option>
                            <option value="wav">WAV</option>
                            <option value="ogg">OGG</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Volume Adjust</label>
                        <input type="range" min="0" max="2" step="0.1" value="1">
                    </div>
                    <div class="form-group">
                        <label>Pitch/Key Shift</label>
                        <input type="range" min="-12" max="12" step="1" value="0">
                    </div>
                </div>

                <div class="edit-actions">
                    <button class="btn"><i class="fa-solid fa-save"></i> Save (Overwrite)</button>
                    <button class="btn"><i class="fa-solid fa-copy"></i> Save as New</button>
                    <button class="btn"><i class="fa-solid fa-download"></i> Download</button>
                </div>
            </div>
        </section>

        <section id="logs-view" class="view hidden">
            <header>
                <h2><i class="fa-solid fa-chart-line"></i> Playback Logs</h2>
            </header>
            <div class="logs-container">
                <div class="chart-controls">
                    <select id="log-type">
                        <option value="total">Total Playtime</option>
                        <option value="artist">By Artist</option>
                        <option value="tags">By Tags</option>
                        <option value="year">By Year</option>
                    </select>
                    <select id="log-period">
                        <option value="day">Daily</option>
                        <option value="week">Weekly</option>
                        <option value="month">Monthly</option>
                        <option value="year">Yearly</option>
                    </select>
                </div>
                <div class="chart-wrapper">
                    <canvas id="statsChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
