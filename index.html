<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Music Player & Editor</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <span class="material-icons">library_music</span>
            <h1>WebAudioPlayer</h1>
        </div>
        <div class="auth-section">
            <button id="google-login-btn" class="btn outline">
                <span class="material-icons">cloud_queue</span>
                <span>Google Drive 連携</span>
            </button>
            <div id="user-info" class="hidden">
                <span class="material-icons">account_circle</span>
                <span id="user-name"></span>
            </div>
        </div>
    </header>

    <div class="app-container">
        <nav class="sidebar">
            <ul class="nav-links">
                <li class="active" data-target="page-player">
                    <span class="material-icons">play_circle_filled</span>
                    <span>プレイヤー</span>
                </li>
                <li data-target="page-editor">
                    <span class="material-icons">tune</span>
                    <span>ファイル編集</span>
                </li>
                <li data-target="page-logs">
                    <span class="material-icons">bar_chart</span>
                    <span>再生ログ</span>
                </li>
            </ul>
        </nav>

        <main class="content-area">
            
            <section id="page-player" class="page-section active">
                <div class="player-header">
                    <h2>プレイヤー</h2>
                    <div id="drop-zone" class="drop-zone">
                        <span class="material-icons">upload_file</span>
                        <p>ファイルをここにドラッグ＆ドロップ、またはクリックして追加</p>
                        <input type="file" id="file-input" multiple accept="audio/*" class="hidden">
                    </div>
                </div>

                <div class="player-layout">
                    <div class="playlist-container">
                        <div class="playlist-controls">
                            <select id="sort-select" class="control-select">
                                <option value="date_desc">追加順 (新しい順)</option>
                                <option value="date_asc">追加順 (古い順)</option>
                                <option value="name_asc">名前順 (昇順)</option>
                                <option value="name_desc">名前順 (降順)</option>
                            </select>
                            <button id="shuffle-btn" class="icon-btn" title="ランダム再生"><span class="material-icons">shuffle</span></button>
                            <button id="repeat-btn" class="icon-btn" title="連続再生切り替え"><span class="material-icons">repeat</span></button>
                        </div>
                        <ul id="playlist" class="playlist">
                            </ul>
                    </div>

                    <div class="now-playing">
                        <div class="artwork-placeholder" id="artwork-display">
                            <span class="material-icons">album</span>
                        </div>
                        <div class="track-info">
                            <h3 id="current-title">選択されていません</h3>
                            <p id="current-artist">---</p>
                        </div>
                        <audio id="audio-element"></audio>
                        <div class="progress-container">
                            <span id="time-current">0:00</span>
                            <input type="range" id="seek-bar" value="0" max="100">
                            <span id="time-total">0:00</span>
                        </div>
                        <div class="playback-controls">
                            <button id="prev-btn" class="icon-btn large"><span class="material-icons">skip_previous</span></button>
                            <button id="play-pause-btn" class="icon-btn large primary"><span class="material-icons">play_arrow</span></button>
                            <button id="next-btn" class="icon-btn large"><span class="material-icons">skip_next</span></button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="page-editor" class="page-section hidden">
                <h2>音声ファイル情報編集</h2>
                <div class="editor-layout">
                    <p>※編集機能はフェーズ4で実装予定です。</p>
                </div>
            </section>

            <section id="page-logs" class="page-section hidden">
                <h2>再生ログ・統計</h2>
                <div class="logs-controls">
                    <select id="log-period-select" class="control-select">
                        <option value="day">日別</option>
                        <option value="week">週別</option>
                        <option value="month">月別</option>
                        <option value="year">年別</option>
                        <option value="total">総合</option>
                    </select>
                    <select id="log-type-select" class="control-select">
                        <option value="author">作者別</option>
                        <option value="tag">タグ別</option>
                        <option value="decade">年代別</option>
                    </select>
                </div>
                <div class="chart-container">
                    <canvas id="logsChart"></canvas>
                </div>
            </section>

        </main>
    </div>

    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
